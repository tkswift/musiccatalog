<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} – {% endif %}Music Catalog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F172A;
      color: #F8FAFC;
      min-height: 100vh;
      padding: 60px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 640px;
      width: 100%;
    }
    .badge {
      background: #6366F120;
      border: 1px solid #6366F140;
      color: #A5B4FC;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      display: block;
      width: fit-content;
      margin: 0 auto 28px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 16px;
      text-align: center;
    }
    h1 .accent { color: #6366F1; }
    h2 {
      font-size: 20px;
      font-weight: 600;
      color: #F8FAFC;
      margin-top: 40px;
      margin-bottom: 12px;
    }
    h3 {
      font-size: 16px;
      font-weight: 600;
      color: #F8FAFC;
      margin-top: 28px;
      margin-bottom: 8px;
    }
    p {
      font-size: 17px;
      color: #94A3B8;
      line-height: 1.7;
      margin-bottom: 20px;
    }
    a {
      color: #818CF8;
      text-decoration: none;
    }
    a:hover { color: #A5B4FC; text-decoration: underline; }
    ul {
      list-style: none;
      padding: 0;
      margin-bottom: 32px;
    }
    ul li {
      font-size: 17px;
      color: #94A3B8;
      line-height: 1.7;
      padding: 8px 0;
      padding-left: 24px;
      position: relative;
    }
    ul li::before {
      content: "→";
      position: absolute;
      left: 0;
      color: #6366F1;
    }
    .landing-links {
      margin-top: 48px;
      display: flex;
      justify-content: center;
      gap: 24px;
    }
    .landing-links a {
      font-size: 14px;
      color: #475569;
    }
    .landing-links a:hover { color: #94A3B8; }
    .back-link {
      font-size: 14px;
      color: #475569;
      margin-bottom: 32px;
      display: inline-block;
    }
    .back-link:hover { color: #94A3B8; }
    hr {
      border: none;
      border-top: 1px solid #1E293B;
      margin: 40px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0 28px;
      font-size: 15px;
    }
    th, td {
      border: 1px solid #1E293B;
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      color: #94A3B8;
    }
    th {
      background: #1E293B;
      color: #F8FAFC;
      font-weight: 600;
    }
    strong { color: #F8FAFC; }
    .footer-meta {
      margin-top: 48px;
      font-size: 12px;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
